server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Ativa compressão Gzip para acelerar o carregamento de arquivos grandes
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # RESOLUÇÃO ERRO 502: Aumentar buffers para lidar com headers grandes do Jellyfin
    proxy_buffer_size   128k;
    proxy_buffers   4 256k;
    proxy_busy_buffers_size   256k;
    
    # Configurações de timeout para evitar quedas em conexões lentas
    client_header_timeout 3m;
    client_body_timeout 3m;
    send_timeout 3m;
    client_max_body_size 100M;

    # Suporte para Single Page Application (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configurações de Cache para arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
