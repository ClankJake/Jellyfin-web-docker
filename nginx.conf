worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Otimizações de performance para não sobrecarregar a CPU
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffers pequenos para não consumir RAM da máquina host
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 1. Servir o Frontend Estático
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 2. Proxy Seletivo para o Backend (Apenas API e Auth)
        # Usamos variáveis de ambiente para o endereço do backend
        location /System {
            proxy_pass ${JELLYFIN_SERVER};
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Desativar buffering para não "comer" RAM com streams
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Repetir para outras rotas essenciais de login
        location /Users {
            proxy_pass ${JELLYFIN_SERVER};
            proxy_buffering off;
        }

        location /Sessions {
            proxy_pass ${JELLYFIN_SERVER};
            proxy_buffering off;
        }
    }
}
